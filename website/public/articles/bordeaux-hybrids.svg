  <text x="520" y="160" font-family="Georgia,serif" font-size="42" font-weight="300" fill="#F5F0EB"><tspan x="520" dy="0">Bordeaux Adopts Hybrid Grapes</tspan></text>
  <line x1="520" y1="195" x2="820" y2="195" stroke="#8B2252" stroke-opacity="0.3" stroke-width="0.5"/>
