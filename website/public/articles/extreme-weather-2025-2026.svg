      <stop offset="0%" stop-color="#0D0D0D"/><stop offset="40%" stop-color="#1A1210"/><stop offset="100%" stop-color="#1F1510"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#sky)"/>
  <rect x="0" y="0" width="1200" height="4" fill="#E8875B"/>
  <text x="640" y="160" font-family="Georgia,serif" font-size="44" font-weight="300" fill="#F5F0EB"><tspan x="640" dy="0">One Vintage, Four Disasters</tspan></text>
