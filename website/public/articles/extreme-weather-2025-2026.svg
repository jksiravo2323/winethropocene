<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D0D0D"/>
      <stop offset="40%" stop-color="#1A1210"/>
      <stop offset="100%" stop-color="#1F1510"/>
    </linearGradient>
    <linearGradient id="fire" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8875B" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8B2252" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="frostGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8D4E3" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#B8D4E3" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="hailGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4C5B9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D4C5B9" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="droughtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4743E" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C4743E" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="smokeGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#4A4A4A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4A4A4A" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#sky)"/>
  <rect x="0" y="0" width="1200" height="4" fill="#E8875B"/>

  <!-- Quadrant panels -->
  <!-- Frost panel (top-left) -->
  <rect x="30" y="30" width="270" height="175" rx="3" fill="#0D0D0D" stroke="#B8D4E3" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="30" y="30" width="270" height="175" rx="3" fill="url(#frostGrad)"/>
  <!-- Frost crystals / vineyard rows -->
  <g opacity="0.6">
    <line x1="60" y1="195" x2="60" y2="100" stroke="#B8D4E3" stroke-width="0.5"/>
    <line x1="70" y1="195" x2="65" y2="115" stroke="#B8D4E3" stroke-width="0.4"/>
    <line x1="78" y1="195" x2="72" y2="108" stroke="#B8D4E3" stroke-width="0.5"/>
    <line x1="90" y1="195" x2="90" y2="95" stroke="#B8D4E3" stroke-width="0.5"/>
    <line x1="100" y1="195" x2="95" y2="110" stroke="#B8D4E3" stroke-width="0.4"/>
    <line x1="108" y1="195" x2="102" y2="105" stroke="#B8D4E3" stroke-width="0.5"/>
    <line x1="120" y1="195" x2="120" y2="98" stroke="#B8D4E3" stroke-width="0.5"/>
    <line x1="130" y1="195" x2="125" y2="112" stroke="#B8D4E3" stroke-width="0.4"/>
    <line x1="138" y1="195" x2="132" y2="107" stroke="#B8D4E3" stroke-width="0.5"/>
    <line x1="150" y1="195" x2="150" y2="102" stroke="#B8D4E3" stroke-width="0.5"/>
    <line x1="160" y1="195" x2="155" y2="118" stroke="#B8D4E3" stroke-width="0.4"/>
    <line x1="168" y1="195" x2="162" y2="109" stroke="#B8D4E3" stroke-width="0.5"/>
    <line x1="180" y1="195" x2="180" y2="96" stroke="#B8D4E3" stroke-width="0.5"/>
    <line x1="190" y1="195" x2="186" y2="114" stroke="#B8D4E3" stroke-width="0.4"/>
    <line x1="200" y1="195" x2="195" y2="110" stroke="#B8D4E3" stroke-width="0.5"/>
    <!-- Frost crystal top -->
    <polygon points="110,85 115,65 120,85" fill="none" stroke="#B8D4E3" stroke-width="0.4" opacity="0.7"/>
    <polygon points="160,92 165,72 170,92" fill="none" stroke="#B8D4E3" stroke-width="0.4" opacity="0.7"/>
  </g>
  <text x="165" y="50" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="10" letter-spacing="3" fill="#B8D4E3" opacity="0.7">FROST</text>

  <!-- Hail panel (top-right) -->
  <rect x="320" y="30" width="270" height="175" rx="3" fill="#0D0D0D" stroke="#D4C5B9" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="320" y="30" width="270" height="175" rx="3" fill="url(#hailGrad)"/>
  <g opacity="0.6">
    <!-- Vineyard rows -->
    <path d="M340,195 Q365,140 390,195" fill="none" stroke="#8B2252" stroke-width="0.5" opacity="0.4"/>
    <path d="M380,195 Q405,145 430,195" fill="none" stroke="#8B2252" stroke-width="0.5" opacity="0.4"/>
    <path d="M420,195 Q445,142 470,195" fill="none" stroke="#8B2252" stroke-width="0.5" opacity="0.4"/>
    <path d="M460,195 Q485,143 510,195" fill="none" stroke="#8B2252" stroke-width="0.5" opacity="0.4"/>
    <!-- Hailstones -->
    <circle cx="370" cy="105" r="4" fill="none" stroke="#D4C5B9" stroke-width="0.6"/>
    <circle cx="415" cy="88" r="3" fill="none" stroke="#D4C5B9" stroke-width="0.6"/>
    <circle cx="450" cy="95" r="5" fill="none" stroke="#D4C5B9" stroke-width="0.6"/>
    <circle cx="490" cy="82" r="3.5" fill="none" stroke="#D4C5B9" stroke-width="0.6"/>
    <circle cx="395" cy="75" r="2.5" fill="none" stroke="#D4C5B9" stroke-width="0.5"/>
    <circle cx="525" cy="90" r="3" fill="none" stroke="#D4C5B9" stroke-width="0.6"/>
    <circle cx="355" cy="130" r="3.5" fill="none" stroke="#D4C5B9" stroke-width="0.5"/>
    <circle cx="480" cy="115" r="2.5" fill="none" stroke="#D4C5B9" stroke-width="0.5"/>
    <circle cx="540" cy="105" r="4" fill="none" stroke="#D4C5B9" stroke-width="0.5"/>
  </g>
  <text x="455" y="50" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="10" letter-spacing="3" fill="#D4C5B9" opacity="0.7">HAIL</text>

  <!-- Drought panel (bottom-left) -->
  <rect x="30" y="225" width="270" height="175" rx="3" fill="#0D0D0D" stroke="#C4743E" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="30" y="225" width="270" height="175" rx="3" fill="url(#droughtGrad)"/>
  <g opacity="0.6">
    <!-- Cracked earth pattern -->
    <path d="M60,390 L110,340 L160,390 L110,395 Z" fill="none" stroke="#C4743E" stroke-width="0.4"/>
    <path d="M140,390 L180,350 L230,390 L180,395 Z" fill="none" stroke="#C4743E" stroke-width="0.4"/>
    <path d="M90,390 L120,330 L160,390" fill="none" stroke="#C4743E" stroke-width="0.4"/>
    <path d="M200,390 L240,345 L280,390" fill="none" stroke="#C4743E" stroke-width="0.4"/>
    <!-- Dying vine -->
    <path d="M145,395 Q145,330 130,300" fill="none" stroke="#8B2252" stroke-width="0.8" opacity="0.5"/>
    <path d="M130,300 Q110,290 100,310" fill="none" stroke="#8B2252" stroke-width="0.5" opacity="0.4"/>
    <path d="M130,300 Q140,285 155,295" fill="none" stroke="#8B2252" stroke-width="0.5" opacity="0.4"/>
    <!-- Sun -->
    <circle cx="240" cy="250" r="18" fill="none" stroke="#C4743E" stroke-width="0.5" opacity="0.5"/>
    <circle cx="240" cy="250" r="14" fill="#C4743E" fill-opacity="0.08"/>
  </g>
  <text x="165" y="245" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="10" letter-spacing="3" fill="#C4743E" opacity="0.7">DROUGHT</text>

  <!-- Smoke panel (bottom-right) -->
  <rect x="320" y="225" width="270" height="175" rx="3" fill="#0D0D0D" stroke="#4A4A4A" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="320" y="225" width="270" height="175" rx="3" fill="url(#smokeGrad)"/>
  <g opacity="0.6">
    <!-- Smoke plumes -->
    <path d="M380,390 Q360,340 370,290 Q380,260 390,250" fill="none" stroke="#6A6A6A" stroke-width="3" opacity="0.2"/>
    <path d="M420,390 Q400,330 410,280 Q420,250 435,240" fill="none" stroke="#6A6A6A" stroke-width="4" opacity="0.15"/>
    <path d="M460,390 Q450,345 455,300 Q460,270 470,255" fill="none" stroke="#6A6A6A" stroke-width="2.5" opacity="0.18"/>
    <path d="M500,390 Q480,335 490,285 Q500,260 510,248" fill="none" stroke="#6A6A6A" stroke-width="3.5" opacity="0.13"/>
    <!-- Vineyard rows below smoke -->
    <path d="M345,395 Q365,355 385,395" fill="none" stroke="#8B2252" stroke-width="0.5" opacity="0.3"/>
    <path d="M395,395 Q415,358 435,395" fill="none" stroke="#8B2252" stroke-width="0.5" opacity="0.3"/>
    <path d="M445,395 Q465,352 485,395" fill="none" stroke="#8B2252" stroke-width="0.5" opacity="0.3"/>
    <path d="M495,395 Q515,360 535,395" fill="none" stroke="#8B2252" stroke-width="0.5" opacity="0.3"/>
  </g>
  <text x="455" y="245" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="10" letter-spacing="3" fill="#6A6A6A" opacity="0.7">SMOKE</text>

  <!-- Right title column -->
  <text x="640" y="140" font-family="Georgia,serif" font-size="44" font-weight="300" fill="#F5F0EB">
    <tspan x="640" dy="0">One Vintage,</tspan>
    <tspan x="640" dy="56">Four Disasters</tspan>
  </text>

  <!-- Divider line -->
  <line x1="640" y1="180" x2="940" y2="180" stroke="#E8875B" stroke-opacity="0.3" stroke-width="0.5"/>

  <text x="640" y="220" font-family="IBM Plex Sans,sans-serif" font-size="16" fill="rgba(245,240,235,0.62)">
    Frost · Hail · Drought · Wildfire Smoke
  </text>
  <text x="640" y="248" font-family="IBM Plex Sans,sans-serif" font-size="15" fill="rgba(245,240,235,0.42)">
    The 2025–2026 growing season compressed four of wine's
  </text>
  <text x="640" y="272" font-family="IBM Plex Sans,sans-serif" font-size="15" fill="rgba(245,240,235,0.42)">
    worst climate threats into a single year.
  </text>

  <!-- Badge -->
  <rect x="640" y="320" rx="999" width="140" height="28" fill="none" stroke="#E8875B" stroke-width="1"/>
  <text x="710" y="339" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="11" letter-spacing="2" fill="#E8875B">DATA STORY</text>

  <!-- Brand -->
  <text x="640" y="420" font-family="IBM Plex Sans,sans-serif" font-size="14" letter-spacing="4" fill="#8B2252" opacity="0.8">WINETHROPOCENE</text>

  <!-- Date -->
  <text x="640" y="460" font-family="IBM Plex Sans,sans-serif" font-size="12" fill="rgba(245,240,235,0.28)">15 June 2026</text>

  <!-- Decorative bottom-right gradient -->
  <rect x="900" y="500" width="300" height="130" fill="url(#fire)" opacity="0.3"/>
</svg>
