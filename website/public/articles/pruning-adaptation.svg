<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D0D0D"/>
      <stop offset="45%" stop-color="#12100A"/>
      <stop offset="100%" stop-color="#0F0D08"/>
    </linearGradient>
    <linearGradient id="sap" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#9A7B4F" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#9A7B4F" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="#9A7B4F"/>

  <!-- Left: illustration — a vine trunk, branched soft-pruning architecture -->
  <rect x="30" y="30" width="460" height="570" rx="3" fill="#0D0D0D" stroke="#9A7B4F" stroke-opacity="0.12" stroke-width="1"/>
  <rect x="30" y="430" width="460" height="170" fill="url(#sap)"/>

  <!-- Ground line -->
  <line x1="60" y1="540" x2="460" y2="540" stroke="#9A7B4F" stroke-opacity="0.25" stroke-width="0.6"/>

  <!-- Main trunk -->
  <path d="M260,540 C255,470 248,420 250,360" fill="none" stroke="#9A7B4F" stroke-opacity="0.8" stroke-width="6" stroke-linecap="round"/>
  <!-- Branching arms (architecture that occupies space with age) -->
  <path d="M250,360 C235,330 200,318 170,305" fill="none" stroke="#9A7B4F" stroke-opacity="0.7" stroke-width="4" stroke-linecap="round"/>
  <path d="M250,360 C268,332 305,322 338,312" fill="none" stroke="#9A7B4F" stroke-opacity="0.7" stroke-width="4" stroke-linecap="round"/>
  <path d="M250,415 C232,400 205,398 182,392" fill="none" stroke="#9A7B4F" stroke-opacity="0.6" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M250,415 C270,402 300,400 322,394" fill="none" stroke="#9A7B4F" stroke-opacity="0.6" stroke-width="3.2" stroke-linecap="round"/>

  <!-- Young shoots (small cuts on young wood) -->
  <g stroke="#9A7B4F" stroke-opacity="0.5" stroke-width="1.4" stroke-linecap="round">
    <path d="M170,305 C162,288 158,274 160,260"/>
    <path d="M170,305 C180,290 188,280 196,268"/>
    <path d="M338,312 C332,296 330,282 334,268"/>
    <path d="M338,312 C348,298 356,290 362,278"/>
    <path d="M182,392 C176,378 174,368 178,356"/>
    <path d="M322,394 C328,380 332,370 330,358"/>
  </g>

  <!-- Continuous sap-flow dots rising through the trunk -->
  <g fill="#9A7B4F" opacity="0.55">
    <circle cx="256" cy="520" r="1.6"/>
    <circle cx="253" cy="492" r="1.6"/>
    <circle cx="251" cy="464" r="1.6"/>
    <circle cx="249" cy="436" r="1.5"/>
    <circle cx="249" cy="408" r="1.5"/>
    <circle cx="250" cy="380" r="1.4"/>
  </g>

  <!-- "Respect wood" cut markers — small offshoots, wound kept off the trunk -->
  <g stroke="#C4743E" stroke-opacity="0.5" stroke-width="1">
    <line x1="196" y1="268" x2="204" y2="262"/>
    <line x1="362" y1="278" x2="370" y2="272"/>
    <line x1="178" y1="356" x2="186" y2="350"/>
  </g>

  <!-- Stat inside illustration -->
  <text x="260" y="120" text-anchor="middle" font-family="Georgia,serif" font-size="40" fill="#9A7B4F" opacity="0.34">160+</text>
  <text x="260" y="142" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" letter-spacing="1" fill="#9A7B4F" opacity="0.34">estates, from Romanée-Conti to the Andes</text>

  <text x="80" y="575" font-family="Helvetica,Arial,sans-serif" font-size="9" letter-spacing="2" fill="#9A7B4F" opacity="0.45">NO WATER</text>
  <text x="210" y="575" font-family="Helvetica,Arial,sans-serif" font-size="9" letter-spacing="2" fill="#9A7B4F" opacity="0.35">NO REPLANTING</text>
  <text x="360" y="575" font-family="Helvetica,Arial,sans-serif" font-size="9" letter-spacing="2" fill="#9A7B4F" opacity="0.28">JUST THE CUT</text>

  <!-- Right: title and text -->
  <text x="540" y="135" font-family="Georgia,serif" font-size="44" font-weight="300" fill="#F5F0EB">
    <tspan x="540" dy="0">Pruning Is Now</tspan>
    <tspan x="540" dy="54">Climate</tspan>
    <tspan x="540" dy="54">Adaptation</tspan>
  </text>

  <line x1="540" y1="318" x2="900" y2="318" stroke="#9A7B4F" stroke-opacity="0.3" stroke-width="0.5"/>

  <text x="540" y="356" font-family="Helvetica,Arial,sans-serif" font-size="15" fill="rgba(245,240,235,0.5)">
    Genetics and geography get the headlines.
  </text>
  <text x="540" y="380" font-family="Helvetica,Arial,sans-serif" font-size="15" fill="rgba(245,240,235,0.5)">
    The cheapest tool is how you cut the vine.
  </text>

  <text x="540" y="430" font-family="Georgia,serif" font-size="18" fill="#9A7B4F" opacity="0.6" font-style="italic">It keeps the old vines alive —</text>
  <text x="540" y="455" font-family="Georgia,serif" font-size="18" fill="#9A7B4F" opacity="0.6" font-style="italic">and buys time while the belt moves.</text>

  <!-- Badge -->
  <rect x="540" y="490" rx="999" width="165" height="28" fill="none" stroke="#9A7B4F" stroke-width="1"/>
  <text x="622" y="509" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" letter-spacing="2" fill="#9A7B4F">CURATED BRIEF</text>

  <!-- Brand -->
  <text x="540" y="565" font-family="Helvetica,Arial,sans-serif" font-size="14" letter-spacing="4" fill="#8B2252" opacity="0.7">WINETHROPOCENE</text>
  <text x="900" y="565" text-anchor="end" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="rgba(245,240,235,0.28)">1 July 2026</text>

  <rect x="950" y="470" width="250" height="160" fill="#9A7B4F" fill-opacity="0.02"/>
</svg>
