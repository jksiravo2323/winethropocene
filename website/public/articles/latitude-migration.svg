<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D0D0D"/>
      <stop offset="40%" stop-color="#0F141A"/>
      <stop offset="100%" stop-color="#0A1018"/>
    </linearGradient>
    <linearGradient id="globeShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B9BD5" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#5B9BD5" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="beltOld" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B2252" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8B2252" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="beltNew" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5B9BD5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5B9BD5" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="#5B9BD5"/>

  <!-- Globe sphere -->
  <circle cx="280" cy="315" r="170" fill="none" stroke="#5B9BD5" stroke-opacity="0.12" stroke-width="1"/>
  <circle cx="280" cy="315" r="170" fill="url(#globeShade)"/>

  <!-- Latitude lines -->
  <g stroke="#5B9BD5" stroke-opacity="0.15" stroke-width="0.4">
    <line x1="110" y1="200" x2="450" y2="200"/>
    <line x1="110" y1="250" x2="450" y2="250"/>
    <line x1="110" y1="300" x2="450" y2="300"/>
    <line x1="110" y1="350" x2="450" y2="350"/>
    <line x1="110" y1="400" x2="450" y2="400"/>
  </g>

  <!-- Old wine belt (30-50°N) — fading -->
  <rect x="110" y="340" width="340" height="70" rx="2" fill="url(#beltOld)" opacity="0.5"/>
  <!-- New wine belt (shifted poleward) -->
  <rect x="110" y="220" width="340" height="60" rx="2" fill="url(#beltNew)" opacity="0.6"/>

  <!-- Shift arrows -->
  <g filter="url(#glow)">
    <path d="M200,340 L200,280" fill="none" stroke="#5B9BD5" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
    <polygon points="196,286 200,276 204,286" fill="#5B9BD5" opacity="0.5"/>
    <path d="M360,340 L360,280" fill="none" stroke="#5B9BD5" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
    <polygon points="356,286 360,276 364,286" fill="#5B9BD5" opacity="0.5"/>
  </g>

  <!-- Old zone labels -->
  <text x="280" y="370" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="9" fill="#8B2252" opacity="0.5">30°–50°N traditional wine belt</text>

  <!-- New zone labels -->
  <text x="280" y="248" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="9" fill="#5B9BD5" opacity="0.5">new suitable zones 35°–55°N</text>

  <!-- Equator marker -->
  <line x1="110" y1="360" x2="450" y2="360" stroke="#5B9BD5" stroke-opacity="0.08" stroke-width="0.3"/>
  <text x="120" y="358" font-family="IBM Plex Sans,sans-serif" font-size="7" fill="#5B9BD5" opacity="0.3">EQ</text>

  <!-- Vineyard pin dots on globe -->
  <!-- Old-world pins (lower) -->
  <g opacity="0.4">
    <circle cx="210" cy="350" r="2.5" fill="#8B2252"/>
    <circle cx="260" cy="347" r="2" fill="#8B2252"/>
    <circle cx="310" cy="345" r="2.5" fill="#8B2252"/>
    <circle cx="350" cy="352" r="2" fill="#8B2252"/>
    <circle cx="390" cy="348" r="2.5" fill="#8B2252"/>
  </g>
  <!-- New-world pins (upper — shifting north) -->
  <g opacity="0.7">
    <circle cx="230" cy="240" r="3" fill="#5B9BD5"/>
    <circle cx="280" cy="235" r="2.5" fill="#5B9BD5"/>
    <circle cx="330" cy="238" r="3" fill="#5B9BD5"/>
    <circle cx="370" cy="242" r="2.5" fill="#5B9BD5"/>
    <circle cx="410" cy="237" r="2" fill="#5B9BD5"/>
  </g>

  <!-- Region labels -->
  <text x="230" y="228" font-family="IBM Plex Sans,sans-serif" font-size="8" fill="#5B9BD5" opacity="0.6">England</text>
  <text x="325" y="226" font-family="IBM Plex Sans,sans-serif" font-size="8" fill="#5B9BD5" opacity="0.6">Denmark</text>
  <text x="405" y="228" font-family="IBM Plex Sans,sans-serif" font-size="8" fill="#5B9BD5" opacity="0.6">Sweden</text>

  <!-- Right: title and text -->
  <text x="520" y="140" font-family="Georgia,serif" font-size="44" font-weight="300" fill="#F5F0EB">
    <tspan x="520" dy="0">The Wine Belt</tspan>
    <tspan x="520" dy="56">Is Moving</tspan>
  </text>

  <line x1="520" y1="180" x2="820" y2="180" stroke="#5B9BD5" stroke-opacity="0.3" stroke-width="0.5"/>

  <text x="520" y="220" font-family="IBM Plex Sans,sans-serif" font-size="16" fill="rgba(245,240,235,0.62)">
    Pinot Noir is heading to Denmark. Cabernet to Canada.
  </text>
  <text x="520" y="250" font-family="IBM Plex Sans,sans-serif" font-size="15" fill="rgba(245,240,235,0.42)">
    Wine-growing suitability is shifting poleward
  </text>
  <text x="520" y="274" font-family="IBM Plex Sans,sans-serif" font-size="15" fill="rgba(245,240,235,0.42)">
    at 55–110 km per decade.
  </text>

  <!-- Stat callout -->
  <text x="520" y="330" font-family="Georgia,serif" font-size="36" fill="#5B9BD5" opacity="0.7">+34%</text>
  <text x="520" y="355" font-family="IBM Plex Sans,sans-serif" font-size="13" fill="rgba(245,240,235,0.42)">suitable area at 50°N by 2050</text>

  <!-- Badge -->
  <rect x="520" y="395" rx="999" width="140" height="28" fill="none" stroke="#5B9BD5" stroke-width="1"/>
  <text x="590" y="414" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="11" letter-spacing="2" fill="#5B9BD5">DATA STORY</text>

  <!-- Brand -->
  <text x="520" y="495" font-family="IBM Plex Sans,sans-serif" font-size="14" letter-spacing="4" fill="#8B2252" opacity="0.8">WINETHROPOCENE</text>
  <text x="520" y="535" font-family="IBM Plex Sans,sans-serif" font-size="12" fill="rgba(245,240,235,0.28)">18 June 2026</text>

  <!-- Decorative bottom-right -->
  <rect x="950" y="500" width="250" height="130" fill="#5B9BD5" fill-opacity="0.03"/>
</svg>
