<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D0D0D"/><stop offset="40%" stop-color="#0F141A"/><stop offset="100%" stop-color="#0A1018"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="#5B9BD5"/>
  <text x="520" y="160" font-family="Georgia,serif" font-size="44" font-weight="300" fill="#F5F0EB"><tspan x="520" dy="0">The Wine Belt Is Moving</tspan></text>
  <line x1="520" y1="195" x2="820" y2="195" stroke="#5B9BD5" stroke-opacity="0.3" stroke-width="0.5"/>
  <text x="520" y="240" font-family="IBM Plex Sans,sans-serif" font-size="16" fill="rgba(245,240,235,0.62)">Pinot Noir is heading to Denmark. Cabernet to Canada.</text>
  <text x="520" y="270" font-family="IBM Plex Sans,sans-serif" font-size="15" fill="rgba(245,240,235,0.42)">Wine-growing suitability shifting poleward at 55–110 km per decade.</text>
  <rect x="520" y="340" rx="999" width="140" height="28" fill="none" stroke="#5B9BD5" stroke-width="1"/>
  <text x="590" y="359" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="11" letter-spacing="2" fill="#5B9BD5">DATA STORY</text>
  <text x="520" y="460" font-family="IBM Plex Sans,sans-serif" font-size="14" letter-spacing="4" fill="#8B2252" opacity="0.7">WINETHROPOCENE</text>
</svg>
